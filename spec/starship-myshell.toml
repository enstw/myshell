"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$git_state\
[](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
$package\
[](fg:#212736 bg:#1d2230)\
$cmd_duration\
$time\
[ ](fg:#1d2230)\
\n$character"""

# --- Directory (tokyo-night) ---

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# --- Git (tokyo-night + Chinese TC) ---

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ ж–ј $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
conflicted = "зүҙ"
ahead = "е…Ҳ"
behind = "еҫҢ"
modified = "з•°"
staged = "еҫ…"
untracked = "йҖё"
deleted = "дәЎ"
renamed = "йҒ·"
stashed = "еҢҝ"

[git_state]
style = "bg:#394260"
format = '[[ $state($progress_current/$progress_total) ](fg:#769ff0 bg:#394260)]($style)'
rebase = "йҮҚеҹә"
merge = "еҗҲдҪө"
revert = "еҫ©еҺҹ"
cherry_pick = "ж‘ҳеҸ–"
bisect = "дәҢеҲҶ"
am = "йғөиЈң"
am_or_rebase = "йғөиЈң/йҮҚеҹә"

# --- VCS (Chinese TC) ---

[fossil_branch]
style = "bg:#394260"
format = '[[ ж–ј $symbol$branch ](fg:#769ff0 bg:#394260)]($style)'

[hg_branch]
style = "bg:#394260"
format = '[[ ж–ј $symbol$branch ](fg:#769ff0 bg:#394260)]($style)'

# --- Languages (tokyo-night) ---

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

# --- Package (Chinese TC) ---

[package]
style = "bg:#212736"
format = '[[ зӮә $symbol$version ](fg:#769ff0 bg:#212736)]($style)'

# --- Duration & Time (tokyo-night + Chinese TC) ---

[cmd_duration]
style = "bg:#1d2230"
format = '[[ жӯ· $duration ](fg:#a0a9cb bg:#1d2230)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'
